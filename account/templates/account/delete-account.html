{% include 'store/base.html' %}

{% load static %}

{% load crispy_forms_tags %}

{% block content %}

<style>
    body{
        background-color: rgb(143, 140, 140);
    }
</style>

<br>
<div class="container bg-white shadow-md p-5 form-layout">
  <h4 class="text-center my-4 fw-bold text-primary">Account Deletion!</h4><hr>
  <p>Are you sure you want to delete your account!</p>
    
    <form method="post">

        {% csrf_token %}
       
        <button type="submit" class="btn btn-danger navbar-btn text-white" > &nbsp;  Delete your account </button>
        
        <a href="{% url 'profile-management' %}" class="btn btn-primary my-2">Back Safely </a><br>

    </form>

</div>

{% endblock %}
