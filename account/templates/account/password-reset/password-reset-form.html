{% include 'store/base.html' %}

{% load static %}

{% load crispy_forms_tags %}

{% block content %}

<style>
    body{
        background-color: rgb(143, 140, 140);
    }

      /* Django form help text hide */
    .form-text {
        display: none !important;
    }
</style>

<body>
    <br><br>

    <div class="container bg-white shadow-md p-5 form-layout">

    <h3>Confirm password</h3> <hr>
    <p>Enter your new password for login credential</p>


    <form method="post">
        {% csrf_token %}

        {{form|crispy}}
        <br>

         <button type="submit" class="btn btn-primary btn-lg w-100 btn-block p-1.5" >Confirm password</button>
    </form>

    <div>
</body>





{% endblock %}
