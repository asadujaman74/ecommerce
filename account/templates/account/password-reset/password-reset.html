{% include 'store/base.html' %}

{% load static %}

{% load crispy_forms_tags %}

{% block content %}

<style>
    body{
        background-color: rgb(143, 140, 140);
    }
</style>

<body>
    <br><br>

    <div class="container bg-white shadow-md p-5 form-layout">

    <h3>Password Reset</h3> <hr>
    <p>Forgotten your password? enter your email to reset link!</p>


    <form method="post">
        {% csrf_token %}

        {{form.email|as_crispy_field}}
        <br>

         <button type="submit" class="btn btn-primary btn-lg w-100 btn-block p-1.5" >Sent password reset link </button>
    </form>

    <div>
</body>





{% endblock %}
